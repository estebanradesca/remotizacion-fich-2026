<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <!-- 
        Agregar favicon después
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Experimento de Reynolds</title>

        <!-- CSS -->
        <!--No es necesario vite lo importa directamente

        <link rel="stylesheet" href="src/style.css"/> 
        
        -->
        <!-- Fuente Lato-->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Lato&display=swap" rel="stylesheet">
        
    </head>
    <body>
    <!-- Encabezado -->
        <header>
            <h1 class="titulo">Experimento de Reynolds</h1>
        </header>

        <main>             

            <div class="estructura">
                <div class="camara">
                    <h3>Cámara 1</h3>
                    <!--       
                    <img src="/reynolds.png" alt="Equipo de Reynolds"/>
                    -->
                    <video id="stream" autoplay playsinline controls muted width="100%"></video>
                </div>

                <div class="controles">
                    <h3>Datos</h3>
                    <button id="conectar">Restablecer</button>

                    <p id="estado"></p>
                    <div class="control">
                        <p>Agua</p>
                        <input type="range" id="pasos_agua" min="0" max="500" step="1" value="0">
                    </div>

                    <div class="control">
                        <p>Tinta</p>
                        <input type="range" id="pasos_tinta" min="0" max="50" step="1" value="0">
                    </div>

                    <div class="parametros">
                        <p id="contenedor_ado"></p>
                        <p>Caudal: <span id="caudal_valor"></span></p>
                        <p>Temperatura: <span id="temp_valor"> </span></p>
                        <p>Relé: <span id="rele_estado"></span></p>
                        <p>Mensajes:</p>
                        <p id="mensajes">
                        </p>
                        <p></p>
                    </div>
                </div>
            </div>

            <div class="captura">
                <button>Guardar</button>
            </div>
                    
        </main>
        
        <!-- Pie de página -->
        <footer>
            <p>© 2026 FICH | UNIVERSIDAD NACIONAL DEL LITORAL</p>
        </footer>

        <!-- JS -->
        <script type="module" src="src/main.js" defer></script>
    </body>
</html>
